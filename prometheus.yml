global:
  scrape_interval: 5s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "traefik"
    static_configs:
      - targets: ["traefik-master:8080", "traefik-backup:8080"]

  - job_name: "fastapi"
    static_configs:
      - targets: ["user-service:8001", "product-service:8002", "order-service:8003", "payment-service:8004", "reporting-service:8005"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]
