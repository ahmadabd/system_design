global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]

  - job_name: "fastapi"
    static_configs:
      - targets: ["fastapi_8000:8000", "fastapi_8800:8000"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
