services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    user: root
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-9092}'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - ecommerce-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - ecommerce-network
    depends_on:
      - kafka

  user-db:
    image: postgres:17-alpine
    container_name: user-db
    ports:
      - "${USER_DB_HOST_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${USER_DB_NAME:-user_db}
      - POSTGRES_USER=${USER_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${USER_DB_PASSWORD:-postgres_password}
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  product-db:
    image: postgres:17-alpine
    container_name: product-db
    ports:
      - "${PRODUCT_DB_HOST_PORT:-5433}:5432"
    environment:
      - POSTGRES_DB=${PRODUCT_DB_NAME:-product_db}
      - POSTGRES_USER=${PRODUCT_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${PRODUCT_DB_PASSWORD:-postgres_password}
    volumes:
      - product_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  order-db:
    image: postgres:17-alpine
    container_name: order-db
    ports:
      - "${ORDER_DB_HOST_PORT:-5434}:5432"
    environment:
      - POSTGRES_DB=${ORDER_DB_NAME:-order_db}
      - POSTGRES_USER=${ORDER_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${ORDER_DB_PASSWORD:-postgres_password}
    volumes:
      - order_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  payment-db:
    image: postgres:17-alpine
    container_name: payment-db
    ports:
      - "${PAYMENT_DB_HOST_PORT:-5435}:5432"
    environment:
      - POSTGRES_DB=${PAYMENT_DB_NAME:-payment_db}
      - POSTGRES_USER=${PAYMENT_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${PAYMENT_DB_PASSWORD:-postgres_password}
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  reporting-db:
    image: postgres:17-alpine
    container_name: reporting-db
    ports:
      - "${REPORTING_DB_HOST_PORT:-5436}:5432"
    environment:
      - POSTGRES_DB=${REPORTING_DB_NAME:-reporting_db}
      - POSTGRES_USER=${REPORTING_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${REPORTING_DB_PASSWORD:-postgres_password}
    volumes:
      - reporting_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network


  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    ports:
      - "${USER_SERVICE_PORT:-8001}:${USER_SERVICE_PORT:-8001}"
    environment:
      - PORT=${USER_SERVICE_PORT:-8001}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql+asyncpg://${USER_DB_USER:-postgres}:${USER_DB_PASSWORD:-postgres_password}@user-db:5432/${USER_DB_NAME:-user_db}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - SERVICE_NAME=user-service
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sys_design_secure_cache_pass_2026}@redis:${REDIS_PORT:-6379}
    depends_on:
      - user-db
      - kafka
    networks:
      - ecommerce-network

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: product-service
    ports:
      - "${PRODUCT_SERVICE_PORT:-8002}:${PRODUCT_SERVICE_PORT:-8002}"
    environment:
      - PORT=${PRODUCT_SERVICE_PORT:-8002}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql+asyncpg://${PRODUCT_DB_USER:-postgres}:${PRODUCT_DB_PASSWORD:-postgres_password}@product-db:5432/${PRODUCT_DB_NAME:-product_db}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - SERVICE_NAME=product-service
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sys_design_secure_cache_pass_2026}@redis:${REDIS_PORT:-6379}
    depends_on:
      - product-db
      - kafka
    networks:
      - ecommerce-network

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: order-service
    ports:
      - "${ORDER_SERVICE_PORT:-8003}:${ORDER_SERVICE_PORT:-8003}"
    environment:
      - PORT=${ORDER_SERVICE_PORT:-8003}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql+asyncpg://${ORDER_DB_USER:-postgres}:${ORDER_DB_PASSWORD:-postgres_password}@order-db:5432/${ORDER_DB_NAME:-order_db}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - SERVICE_NAME=order-service
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sys_design_secure_cache_pass_2026}@redis:${REDIS_PORT:-6379}
    depends_on:
      - order-db
      - kafka
    networks:
      - ecommerce-network

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT:-8004}:${PAYMENT_SERVICE_PORT:-8004}"
    environment:
      - PORT=${PAYMENT_SERVICE_PORT:-8004}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql+asyncpg://${PAYMENT_DB_USER:-postgres}:${PAYMENT_DB_PASSWORD:-postgres_password}@payment-db:5432/${PAYMENT_DB_NAME:-payment_db}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - SERVICE_NAME=payment-service
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sys_design_secure_cache_pass_2026}@redis:${REDIS_PORT:-6379}
      - ORDER_SERVICE_URL=http://order-service:8003
    depends_on:
      - payment-db
      - kafka
    networks:
      - ecommerce-network

  reporting-service:
    build:
      context: .
      dockerfile: services/reporting-service/Dockerfile
    container_name: reporting-service
    ports:
      - "${REPORTING_SERVICE_PORT:-8005}:${REPORTING_SERVICE_PORT:-8005}"
    environment:
      - PORT=${REPORTING_SERVICE_PORT:-8005}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql+asyncpg://${REPORTING_DB_USER:-postgres}:${REPORTING_DB_PASSWORD:-postgres_password}@reporting-db:5432/${REPORTING_DB_NAME:-reporting_db}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - SERVICE_NAME=reporting-service
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sys_design_secure_cache_pass_2026}@redis:${REDIS_PORT:-6379}
    depends_on:
      - reporting-db
      - kafka
    networks:
      - ecommerce-network

  traefik-master:
    image: traefik:v3.7
    container_name: traefik-master
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "80:80"
    networks:
      ecommerce-network:
        ipv4_address: 172.20.0.250
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
      - reporting-service

  traefik-backup:
    image: traefik:v3.7
    container_name: traefik-backup
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      ecommerce-network:
        ipv4_address: 172.20.0.251
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
      - reporting-service

  keepalived-master:
    image: osixia/keepalived:latest
    container_name: keepalived-master
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BROADCAST
    volumes:
      - ./keepalived-master.conf:/etc/keepalived/keepalived.conf:ro
    network_mode: "service:traefik-master"
    depends_on:
      - traefik-master

  keepalived-backup:
    image: osixia/keepalived:latest
    container_name: keepalived-backup
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BROADCAST
    volumes:
      - ./keepalived-backup.conf:/etc/keepalived/keepalived.conf:ro
    network_mode: "service:traefik-backup"
    depends_on:
      - traefik-backup

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --port ${REDIS_PORT:-6379} --requirepass ${REDIS_PASSWORD:-sys_design_secure_cache_pass_2026}
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    environment:
      - REDIS_ADDR=redis:${REDIS_PORT:-6380}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-sys_design_secure_cache_pass_2026}
    ports:
      - "9121:9121"
    networks:
      - ecommerce-network
    depends_on:
      - redis

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command: --kafka.server=kafka:29092
    ports:
      - "9308:9308"
    networks:
      - ecommerce-network
    depends_on:
      - kafka

networks:
  ecommerce-network:
    name: ecommerce-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  user_db_data:
  product_db_data:
  order_db_data:
  redis_data:
  kafka_data:
  payment_db_data:
  reporting_db_data:


