version: "3.9"

services:
  traefik-master:
    image: traefik:v3.7
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      web:
        ipv4_address: 172.28.0.10

  traefik-backup:
    image: traefik:v3.7
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      web:
        ipv4_address: 172.28.0.11

  keepalived-master:
    image: osixia/keepalived:latest
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BROADCAST
    volumes:
      - ./keepalived-master.conf:/etc/keepalived/keepalived.conf:ro
    network_mode: "service:traefik-master"
    depends_on:
      - traefik-master

  keepalived-backup:
    image: osixia/keepalived:latest
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BROADCAST
    volumes:
      - ./keepalived-backup.conf:/etc/keepalived/keepalived.conf:ro
    network_mode: "service:traefik-backup"
    depends_on:
      - traefik-backup

  fastapi_8000:
    build: ./app
    environment:
      - PORT=8000
    expose:
      - "8000"
    networks:
      web:
        ipv4_address: 172.28.0.20

  fastapi_8800:
    build: ./app
    environment:
      - PORT=8800
    expose:
      - "8000"
    networks:
      web:
        ipv4_address: 172.28.0.21

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      web:
        ipv4_address: 172.28.0.30
    depends_on:
      - alertmanager

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      web:
        ipv4_address: 172.28.0.31

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # UI
    networks:
      web:
        ipv4_address: 172.28.0.32

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      web:
        ipv4_address: 172.28.0.33

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      web:
        ipv4_address: 172.28.0.35

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus exporter
    networks:
      web:
        ipv4_address: 172.28.0.34
    depends_on:
      - jaeger
      - loki

networks:
  web:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  prometheus_data:
  grafana_data:
  loki_data: