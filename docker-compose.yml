version: "3.9"

services:
  traefik:
    image: traefik:v3.7
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - web

  fastapi_8000:
    build: ./app
    environment:
      - PORT=8000
    expose:
      - "8000"
    networks:
      - web

  fastapi_8800:
    build: ./app
    environment:
      - PORT=8800
    expose:
      - "8000"
    networks:
      - web

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - web

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    networks:
      - web

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - web

  # locust:
  #   image: locustio/locust
  #   volumes:
  #     - ./:/mnt/locust
  #   command: -f /mnt/locust/locustfile.py --host http://traefik
  #   ports:
  #     - "8089:8089"
  #   networks:
  #     - web

networks:
  web:
    driver: bridge