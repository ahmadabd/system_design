version: "3.9"

services:
  traefik:
    image: traefik:v3.7
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - web

  fastapi_8000:
    build: ./app
    environment:
      - PORT=8000
    expose:
      - "8000"
    networks:
      - web

  fastapi_8800:
    build: ./app
    environment:
      - PORT=8800
    expose:
      - "8000"
    networks:
      - web

networks:
  web:
    driver: bridge