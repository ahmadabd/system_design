http:
  routers:
    fastapi:
      rule: "Host(`localhost`) && !PathPrefix(`/metrics`)"
      entryPoints:
        - web
      middlewares:
        - "rate-limit"
        - "circuit-breaker"
        - "load-shedding"
      service: fastapi-failover

  middlewares:
    load-shedding:
      maxConn:
        amount: 5
        extractorStrategy:
          clientIP: true

    rate-limit:
      rateLimit:
        average: 10
        burst: 20
        sourceCriterion:
          ipStrategy:
            depth: 0

    circuit-breaker:
      circuitBreaker:
        expression: "ResponseCodeRatio(500, 600, 0, 600) > 0.50"

  services:
    fastapi-failover:
      failover:
        service: fastapi-main
        fallback: fastapi-backup

    fastapi-main:
      loadBalancer:
        healthCheck:
          path: /health
          interval: 2s
          timeout: 1s
        servers:
          - url: "http://fastapi_8000:8000"

    fastapi-backup:
      loadBalancer:
        servers:
          - url: "http://fastapi_8800:8000"