http:
  routers:
    user-router:
      rule: "PathPrefix(`/users`)"
      entryPoints:
        - web
      middlewares:
        - "rate-limit"
        - "load-shedding"
        - "strip-users"
      service: user-service

    product-router:
      rule: "PathPrefix(`/products`)"
      entryPoints:
        - web
      middlewares:
        - "rate-limit"
        - "load-shedding"
        - "strip-products"
      service: product-service

    order-router:
      rule: "PathPrefix(`/orders`)"
      entryPoints:
        - web
      middlewares:
        - "rate-limit"
        - "load-shedding"
        - "strip-orders"
      service: order-service

  middlewares:
    load-shedding:
      inFlightReq:
        amount: 50
        sourceCriterion:
          ipStrategy:
            depth: 0

    rate-limit:
      rateLimit:
        average: 30
        burst: 50
        sourceCriterion:
          ipStrategy:
            depth: 0

    strip-users:
      stripPrefix:
        prefixes:
          - "/users"

    strip-products:
      stripPrefix:
        prefixes:
          - "/products"

    strip-orders:
      stripPrefix:
        prefixes:
          - "/orders"

  services:
    user-service:
      loadBalancer:
        healthCheck:
          path: /health
          interval: 2s
          timeout: 1s
        servers:
          - url: "http://user-service:8001"

    product-service:
      loadBalancer:
        healthCheck:
          path: /health
          interval: 2s
          timeout: 1s
        servers:
          - url: "http://product-service:8002"

    order-service:
      loadBalancer:
        healthCheck:
          path: /health
          interval: 2s
          timeout: 1s
        servers:
          - url: "http://order-service:8003"